<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aroma Bakery | 尊享星賞聚樂部</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --sb-dark-green: #1e3932;
      --sb-primary-green: #006241;
      --sb-light-green: #f1f8f5;
      --sb-gold: #cba258;
      --sb-text-black: #212529;
      --sb-text-gray: #6b6b6b;
      --sb-bg-cream: #f7f7f7;
      --sb-border: #ecebe9;
      --sb-danger: #d62d2d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', "Noto Sans HK", "Microsoft JhengHei", sans-serif; background-color: var(--sb-bg-cream); color: var(--sb-text-black); }
    
    .navbar { background-color: var(--sb-dark-green); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; }
    .navbar .brand { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: white; text-decoration: none; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* 星級綠星卡樣式 */
    .star-card-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
    .star-card { border-radius: 16px; padding: 25px; color: white; position: relative; overflow: hidden; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; transition: background 0.3s ease; }
    
    /* 卡面色彩配置 */
    .card-face-default { background: linear-gradient(135deg, var(--sb-primary-green), var(--sb-dark-green)); }
    .card-face-black { background: linear-gradient(135deg, #111111, #333333); }
    .card-face-gold { background: linear-gradient(135deg, #cba258, #9e7528); }
    .card-face-pink { background: linear-gradient(135deg, #f7a3b5, #d16e85); }
    
    .card-face-selector { margin-top: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .card-face-btn { padding: 6px 12px; border: 1px solid var(--sb-border); background: white; border-radius: 20px; font-size: 12px; cursor: pointer; color: var(--sb-text-black); transition: all 0.2s; }
    .card-face-btn:hover { background: var(--sb-light-green); border-color: var(--sb-primary-green); }
    
    /* 當前訂單專屬分頁樣式 */
    .current-order-page { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 20px; }
    .current-order-header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--sb-border); padding-bottom: 15px; }
    .back-arrow-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--sb-text-black); margin-right: 15px; padding: 5px; font-weight: bold; }
    .pickup-section { display: flex; flex-direction: column; align-items: center; margin: 25px 0; padding: 20px; background: var(--sb-light-green); border-radius: 8px; border: 1px dashed var(--sb-primary-green); }
    .pickup-code-text { font-size: 24px; font-weight: 700; color: var(--sb-primary-green); letter-spacing: 2px; margin-bottom: 15px; }
    .qrcode-box { background: white; padding: 10px; border-radius: 8px; }
    
    /* 基礎分頁系統 */
    .view-section { display: none; }
    .view-section.active { display: block; }
    
    .tab-nav { display: flex; background: white; border-bottom: 1px solid var(--sb-border); margin-bottom: 20px; }
    .tab-link { flex: 1; text-align: center; padding: 15px; font-weight: 600; color: var(--sb-text-gray); cursor: pointer; border-bottom: 3px solid transparent; }
    .tab-link.active { color: var(--sb-primary-green); border-bottom-color: var(--sb-primary-green); }
    
    /* 商品排版 */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
    .product-card { background: white; border-radius: 8px; border: 1px solid var(--sb-border); overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
    .product-info { padding: 15px; }
    .product-meta { font-size: 12px; color: var(--sb-gold); font-weight: bold; margin-bottom: 5px; }
    .product-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .product-price { font-size: 15px; font-weight: 700; color: var(--sb-primary-green); }
    .product-btn { width: 100%; padding: 10px; background: var(--sb-primary-green); color: white; border: none; font-weight: 600; cursor: pointer; text-align: center; }
    
    /* 購物車與按鈕 */
    .cart-summary { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--sb-border); margin-top: 20px; text-align: right; }
    .btn-main { background-color: var(--sb-primary-green); color: white; padding: 12px 24px; border: none; border-radius: 24px; font-weight: 600; cursor: pointer; }
    
    /* 歷史訂單列表 */
    .order-item { background: white; border: 1px solid var(--sb-border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .status-badge { display: inline-block; padding: 4px 8px; font-size: 12px; border-radius: 4px; font-weight: 600; }
    .status-unaccepted { background-color: #ffeeba; color: #856404; }
    .status-shipping { background-color: #b8daff; color: #004085; }
    .status-delivered { background-color: #c3e6cb; color: #155724; }
    .status-cancelled { background-color: #f5c6cb; color: #721c24; }
    
    /* 認證模組 */
    .auth-container { max-width: 400px; margin: 60px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .auth-input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--sb-border); border-radius: 4px; }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="#" class="brand">Aroma Bakery</a>
    <span id="user-display-email">訪客您好</span>
  </div>

  <div id="auth-section" class="auth-container">
    <div style="display:flex; margin-bottom:20px;">
      <button id="btn-toggle-login" class="btn-main" style="flex:1; border-radius:0;" onclick="switchAuthMode('login')">會員登入</button>
      <button id="btn-toggle-reg" class="btn-main" style="flex:1; background:#6b6b6b; border-radius:0;" onclick="switchAuthMode('reg')">新註冊</button>
    </div>
    <div id="login-form">
      <input type="email" id="login-email" class="auth-input" placeholder="電子郵件">
      <input type="password" id="login-password" class="auth-input" placeholder="密碼">
      <button class="btn-main" style="width:100%;" onclick="handleLogin()">登入</button>
    </div>
    <div id="register-form" class="hidden" style="display:none;">
      <input type="email" id="reg-email" class="auth-input" placeholder="設定電子郵件">
      <input type="password" id="reg-password" class="auth-input" placeholder="設定密碼">
      <button class="btn-main" style="width:100%;" onclick="handleRegister()">完成註冊并初始化資產</button>
    </div>
  </div>

  <div id="main-app-section" style="display:none;" class="container">
    
    <div class="star-card-container">
      <div id="green-star-card" class="star-card card-face-default">
        <div>
          <div style="font-size:14px; text-transform:uppercase; letter-spacing:1px;">Aroma Bakery Card</div>
          <div style="font-size:22px; font-weight:700; margin-top:5px;">行動綠星卡</div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
          <div>
            <div style="font-size:11px; opacity:0.8;">星賞餘額</div>
            <div id="card-stars-balance" style="font-size:28px; font-weight:700;">0 Stars</div>
          </div>
          <div>
            <div style="font-size:11px; opacity:0.8;">錢包餘額</div>
            <div id="card-cash-balance" style="font-size:20px; font-weight:700;">HK$ 0</div>
          </div>
        </div>
      </div>
      <div class="card-face-selector">
        <span style="font-size:13px; color:var(--sb-text-gray); font-weight:600;">更換卡面：</span>
        <button class="card-face-btn" onclick="executeCardFaceChange('default')">經典綠(原設)</button>
        <button class="card-face-btn" onclick="executeCardFaceChange('black')">經典黑</button>
        <button class="card-face-btn" onclick="executeCardFaceChange('gold')">星耀金</button>
        <button class="card-face-btn" onclick="executeCardFaceChange('pink')">玫瑰粉</button>
        <span id="card-face-hint" style="font-size:12px; color:var(--sb-gold);"></span>
      </div>
    </div>

    <div class="tab-nav">
      <div class="tab-link active" id="tab-shop" onclick="switchTab('shop')">挑選商品</div>
      <div class="tab-link" id="tab-coupons" onclick="switchTab('coupons')">星賞兌換</div>
      <div class="tab-link" id="tab-orders" onclick="switchTab('orders')">我的訂單</div>
    </div>

    <div id="view-shop" class="view-section active">
      <h3>精選飲品與甜點</h3>
      <div id="product-list-display" class="product-grid"></div>
      
      <div class="cart-summary">
        <h4 style="margin-bottom:10px;">購物車清單</h4>
        <div id="cart-items-preview" style="text-align:left; margin-bottom:15px; font-size:14px; color:var(--sb-text-gray);">購物車內尚無商品</div>
        <div style="font-size:18px; font-weight:700; margin-bottom:15px;">總計金額： <span id="cart-total-amount" style="color:var(--sb-primary-green)">HK$ 0</span></div>
        <button class="btn-main" onclick="processOrderCheckout()">確認購買並支付</button>
      </div>
    </div>

    <div id="view-coupons" class="view-section">
      <h3>星賞好禮兌換中心</h3>
      <div id="coupon-list-display" class="product-grid"></div>
    </div>

    <div id="view-orders" class="view-section">
      <h3>所有歷史訂單紀錄</h3>
      <div id="all-orders-history-list" style="margin-top:15px;"></div>
    </div>

    <div id="view-current-order" class="view-section current-order-page">
      <div class="current-order-header">
        <button class="back-arrow-btn" onclick="exitCurrentOrderView()">←</button>
        <div>
          <h3 style="font-size:18px;">當前新訂單狀態</h3>
          <p style="font-size:12px; color:var(--sb-text-gray);" id="curr-order-id-txt">訂單編號：取得中</p>
        </div>
      </div>
      
      <div style="padding:15px 0; border-bottom:1px solid var(--sb-border);">
        <p style="font-size:15px; font-weight:600; margin-bottom:10px;">訂單進度： <span id="curr-order-status-badge" class="status-badge status-unaccepted">未接單</span></p>
        <div id="curr-order-items-details" style="font-size:14px; color:var(--sb-text-black); line-height:1.6;"></div>
      </div>

      <div class="pickup-section">
        <p style="font-size:14px; font-weight:600; color:var(--sb-text-gray); margin-bottom:5px;">專屬取餐碼</p>
        <div id="curr-pickup-code" class="pickup-code-text">------</div>
        <div id="curr-pickup-qrcode" class="qrcode-box"></div>
        <p style="font-size:12px; color:var(--sb-text-gray); margin-top:10px; text-align:center;">商品送到時請向店員出示此二維碼核銷取餐</p>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, child, update, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 沿用您的專屬 Firebase 設定項目
    const firebaseConfig = {
      apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
      authDomain: "aroma-bakery-492fa.firebaseapp.com",
      databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
      projectId: "aroma-bakery-492fa",
      storageBucket: "aroma-bakery-492fa.firebasestorage.app",
      messagingSenderId: "1060567946315",
      appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce",
      measurementId: "G-D2C1M4SBPC"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUserUid = null;
    let currentUserData = null;
    let shoppingCart = [];
    let currentActiveOrderListener = null;
    let currentActiveOrderId = null;
    let lastNotifiedStatus = null;
    let qrcodeGenerator = null;

    // 狀態常數定義
    const STATUS_UNACCEPTED = "未接單";
    const STATUS_SHIPPING = "配送中";
    const STATUS_DELIVERED = "已送達";
    const STATUS_CANCELLED = "已取消";

    // 初始化狀態監聽
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUserUid = user.uid;
        document.getElementById('user-display-email').textContent = user.email;
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('main-app-section').style.display = 'block';
        
        // 綁定用戶核心資產實時監聽
        onValue(ref(db, `users/${user.uid}`), (snapshot) => {
          if(snapshot.exists()) {
            currentUserData = snapshot.val();
            renderUserCardAssets();
          }
        });

        loadProductCatalog();
        loadCouponCatalog();
        loadUserAllOrders();
      } else {
        currentUserUid = null;
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('main-app-section').style.display = 'none';
      }
    });

    // 渲染行動綠星卡外觀與數據
    function renderUserCardAssets() {
      if(!currentUserData) return;
      document.getElementById('card-stars-balance').textContent = `${currentUserData.stars || 0} Stars`;
      document.getElementById('card-cash-balance').textContent = `HK$ ${currentUserData.cash || 0}`;
      
      const cardEl = document.getElementById('green-star-card');
      cardEl.className = "star-card"; // 清除舊款
      
      const face = currentUserData.cardFace || 'default';
      if(face === 'black') cardEl.classList.add('card-face-black');
      else if(face === 'gold') cardEl.classList.add('card-face-gold');
      else if(face === 'pink') cardEl.classList.add('card-face-pink');
      else cardEl.classList.add('card-face-default');

      const hintEl = document.getElementById('card-face-hint');
      if(currentUserData.cardFaceChanged) {
        hintEl.textContent = "更換規格：每次更換扣除10星賞";
      } else {
        hintEl.textContent = "首度更換免費";
      }
    }

    // 換卡功能執行
    window.executeCardFaceChange = function(faceName) {
      if(!currentUserUid || !currentUserData) return;
      
      let currentStars = currentUserData.stars || 0;
      let cost = 0;
      let alreadyChanged = currentUserData.cardFaceChanged || false;

      if(alreadyChanged) {
        cost = 10;
        if(currentStars < cost) {
          alert("更換失敗：您的星賞餘額不足10星賞");
          return;
        }
      }

      const updatedStars = currentStars - cost;
      const updates = {
        cardFace: faceName,
        cardFaceChanged: true,
        stars: updatedStars
      };

      update(ref(db, `users/${currentUserUid}`), updates).then(() => {
        alert("卡面更換成功");
      });
    };

    // 分頁切換
    window.switchTab = function(tabName) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
      
      const targetView = document.getElementById(`view-${tabName}`);
      const targetTab = document.getElementById(`tab-${tabName}`);
      if(targetView) targetView.classList.add('active');
      if(targetTab) targetTab.classList.add('active');
    };

    // 登入與註冊切換
    window.switchAuthMode = function(mode) {
      if(mode === 'login') {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
      } else {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
      }
    };

    window.handleLogin = function() {
      const em = document.getElementById('login-email').value;
      const pw = document.getElementById('login-password').value;
      if(!em || !pw) return;
      signInWithEmailAndPassword(auth, em, pw).catch(err => alert("登入出錯: " + err.message));
    };

    window.handleRegister = function() {
      const em = document.getElementById('reg-email').value;
      const pw = document.getElementById('reg-password').value;
      if(!em || !pw) return;
      createUserWithEmailAndPassword(auth, em, pw).then((res) => {
        set(ref(db, `users/${res.user.uid}`), {
          email: em,
          cash: 500, // 初始贈送體驗金額
          stars: 50,  // 初始贈送體驗星賞
          cardFace: 'default',
          cardFaceChanged: false
        });
      }).catch(err => alert("註冊失敗: " + err.message));
    };

    // 讀取菜單商品
    function loadProductCatalog() {
      onValue(ref(db, 'products'), (snapshot) => {
        const grid = document.getElementById('product-list-display');
        grid.innerHTML = '';
        if(!snapshot.exists()) {
          grid.innerHTML = '<p>當前無商品提供</p>';
          return;
        }
        snapshot.forEach((childSnap) => {
          const pId = childSnap.key;
          const p = childSnap.val();
          
          const item = document.createElement('div');
          item.className = 'product-card';
          
          // 組裝子分類與主要類別顯示
          const subCatStr = p.subCategory ? ` [${p.subCategory}]` : '';
          
          item.innerHTML = `
            <div class="product-info">
              <div class="product-meta">${p.category}${subCatStr}</div>
              <div class="product-title">${p.title}</div>
              <div class="product-price">HK$ ${p.price}</div>
            </div>
            <button class="product-btn" onclick="addSingleItemToCart('${pId}', '${p.title}', ${p.price})">加入購物袋</button>
          `;
          grid.appendChild(item);
        });
      });
    }

    // 購物車加入項目
    window.addSingleItemToCart = function(id, title, price) {
      shoppingCart.push({ id, title, price });
      refreshCartVisuals();
    };

    function refreshCartVisuals() {
      const preview = document.getElementById('cart-items-preview');
      const totalTxt = document.getElementById('cart-total-amount');
      
      if(shoppingCart.length === 0) {
        preview.textContent = "購物車內尚無商品";
        totalTxt.textContent = "HK$ 0";
        return;
      }

      let total = 0;
      let summaryStr = "";
      shoppingCart.forEach((item, index) => {
        total += item.price;
        summaryStr += `${index + 1}. ${item.title} (HK$ ${item.price})<br>`;
      });

      preview.innerHTML = summaryStr;
      totalTxt.textContent = `HK$ ${total}`;
    }

    // 訂單結帳
    window.processOrderCheckout = function() {
      if(shoppingCart.length === 0) {
        alert("請先加入商品到購物袋中");
        return;
      }
      if(!currentUserData) return;

      let total = 0;
      shoppingCart.forEach(i => total += i.price);

      let walletCash = currentUserData.cash || 0;
      if(walletCash < total) {
        alert("結帳失敗：您的行動錢包餘額不足，請聯繫管理端儲值");
        return;
      }

      // 生成完全獨一無二的專屬取餐碼 (格式：AM-六位大寫隨機碼)
      const charset = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let uniqueCode = "AM-";
      for (let i = 0; i < 6; i++) {
        uniqueCode += charset.charAt(Math.floor(Math.random() * charset.length));
      }

      const orderRef = ref(db, 'orders');
      const newOrderKey = push(orderRef).key;

      const orderPayload = {
        orderId: newOrderKey,
        uid: currentUserUid,
        email: currentUserData.email,
        items: shoppingCart,
        totalAmount: total,
        status: STATUS_UNACCEPTED, // 預設最初進度：未接單
        pickupCode: uniqueCode,
        createdAt: serverTimestamp()
      };

      // 扣除卡片餘額
      const updatedCash = walletCash - total;

      set(ref(db, `orders/${newOrderKey}`), orderPayload).then(() => {
        update(ref(db, `users/${currentUserUid}`), { cash: updatedCash }).then(() => {
          shoppingCart = [];
          refreshCartVisuals();
          
          // 直接引導切換到當前新訂單分頁
          launchCurrentOrderMonitor(newOrderKey);
        });
      });
    };

    // 進入當前專屬新訂單分頁並進行監聽
    function launchCurrentOrderMonitor(orderId) {
      currentActiveOrderId = orderId;
      lastNotifiedStatus = STATUS_UNACCEPTED; // 重設通知狀態

      // 隱藏全部常規分頁，打開特定當前訂單分頁
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
      document.getElementById('view-current-order').classList.add('active');

      document.getElementById('curr-order-id-txt').textContent = `訂單編號：${orderId}`;

      if(currentActiveOrderListener) currentActiveOrderListener(); // 取消舊監聽

      // 開啟實時訂單狀態監聽
      currentActiveOrderListener = onValue(ref(db, `orders/${orderId}`), (snapshot) => {
        if(!snapshot.exists()) return;
        const oData = snapshot.val();

        // 更新狀態徽章
        const badge = document.getElementById('curr-order-status-badge');
        badge.textContent = oData.status;
        badge.className = "status-badge";
        
        if(oData.status === STATUS_UNACCEPTED) badge.classList.add('status-unaccepted');
        else if(oData.status === STATUS_SHIPPING) badge.classList.add('status-shipping');
        else if(oData.status === STATUS_DELIVERED) badge.classList.add('status-delivered');
        else if(oData.status === STATUS_CANCELLED) badge.classList.add('status-cancelled');

        // 核心邏輯：當狀態切換到「配送中」，推送專屬文字通知
        if(oData.status === STATUS_SHIPPING && lastNotifiedStatus !== STATUS_SHIPPING) {
          alert("你的飲品／甜品即將到請準備你的取餐碼");
          lastNotifiedStatus = STATUS_SHIPPING;
        }

        // 渲染品項明細
        let itemHtml = "";
        oData.items.forEach((it) => {
          itemHtml += `<p>• ${it.title} - HK$ ${it.price}</p>`;
        });
        itemHtml += `<p style="margin-top:8px; font-weight:700; color:var(--sb-dark-green)">實付金額：HK$ ${oData.totalAmount}</p>`;
        document.getElementById('curr-order-items-details').innerHTML = itemHtml;

        // 載入取餐碼與繪製二維碼
        document.getElementById('curr-pickup-code').textContent = oData.pickupCode;
        
        const qrContainer = document.getElementById('curr-pickup-qrcode');
        qrContainer.innerHTML = ""; // 排空
        qrcodeGenerator = new QRCode(qrContainer, {
          text: oData.pickupCode,
          width: 140,
          height: 140,
          colorDark: "#1e3932",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      });

      // 定期定時檢驗（15分鐘自動取消）
      // 當顧客開著當前頁面，如果超過15分鐘仍處於「未接單」狀態，則發送取消請求
      setTimeout(() => {
        get(ref(db, `orders/${orderId}`)).then((snap) => {
          if(snap.exists() && snap.val().status === STATUS_UNACCEPTED) {
            update(ref(db, `orders/${orderId}`), { status: STATUS_CANCELLED }).then(() => {
              // 退回款項
              get(ref(db, `users/${currentUserUid}/cash`)).then((cashSnap) => {
                let currentCash = cashSnap.val() || 0;
                update(ref(db, `users/${currentUserUid}`), { cash: currentCash + snap.val().totalAmount });
              });
            });
          }
        });
      }, 15 * 60 * 1000); 
    }

    // 退出當前訂單分頁（左箭頭功能）
    window.exitCurrentOrderView = function() {
      if(currentActiveOrderListener) {
        currentActiveOrderListener(); // 釋放實時當前單點監聽
        currentActiveOrderListener = null;
      }
      // 導航到我的歷史訂單總表
      switchTab('orders');
    };

    // 歷史所有訂單清單讀取
    function loadUserAllOrders() {
      onValue(ref(db, 'orders'), (snapshot) => {
        const wrapper = document.getElementById('all-orders-history-list');
        wrapper.innerHTML = '';
        if(!snapshot.exists()) {
          wrapper.textContent = "目前沒有任何歷史下單紀錄";
          return;
        }

        let hasOrders = false;
        snapshot.forEach((childSnap) => {
          const o = childSnap.val();
          if(o.uid === currentUserUid) {
            hasOrders = true;
            const row = document.createElement('div');
            row.className = 'order-item';
            
            let statusClass = "status-unaccepted";
            if(o.status === STATUS_SHIPPING) statusClass = "status-shipping";
            if(o.status === STATUS_DELIVERED) statusClass = "status-delivered";
            if(o.status === STATUS_CANCELLED) statusClass = "status-cancelled";

            let itemsSummary = o.items.map(i => i.title).join(', ');

            row.innerHTML = `
              <div style="display:flex; justify-content:between; align-items:center; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:12px; color:var(--sb-text-gray);">ID: ${childSnap.key}</span>
                <span class="status-badge ${statusClass}">${o.status}</span>
              </div>
              <div style="font-size:14px; font-weight:600; margin-bottom:5px;">${itemsSummary}</div>
              <div style="font-size:13px; color:var(--sb-primary-green); font-weight:700;">金額: HK$ ${o.totalAmount} | 取餐碼: ${o.pickupCode || '無'}</div>
            `;
            // 最新訂單置頂顯示
            wrapper.insertBefore(row, wrapper.firstChild);
          }
        });

        if(!hasOrders) {
          wrapper.textContent = "目前沒有任何歷史下單紀錄";
        }
      });
    }

    // 載入優惠券清單
    function loadCouponCatalog() {
      onValue(ref(db, 'coupons'), (snapshot) => {
        const grid = document.getElementById('coupon-list-display');
        grid.innerHTML = '';
        if(!snapshot.exists()) {
          grid.innerHTML = '<p>當前無星賞好禮可供兌換</p>';
          return;
        }
        snapshot.forEach((childSnap) => {
          const cId = childSnap.key;
          const c = childSnap.val();
          
          const costText = (c.starCost === 0 || !c.starCost) ? "免星賞直接兌換" : `${c.starCost} Stars`;
          const limitText = c.maxRedeem ? ` | 限兌換 ${c.maxRedeem} 次` : "";

          const item = document.createElement('div');
          item.className = 'product-card';
          item.innerHTML = `
            <div class="product-info">
              <div class="product-meta">星賞限定禮品${limitText}</div>
              <div class="product-title">${c.title}</div>
              <div class="product-price" style="color:var(--sb-gold);">${costText}</div>
            </div>
            <button class="product-btn" style="background:var(--sb-gold);" onclick="executeExchangeCoupon('${cId}')">即刻兌換</button>
          `;
          grid.appendChild(item);
        });
      });
    }

    // 執行優惠券兌換
    window.executeExchangeCoupon = function(couponId) {
      if(!currentUserUid || !currentUserData) return;

      get(ref(db, `coupons/${couponId}`)).then((snap) => {
        if(!snap.exists()) return;
        const c = snap.val();

        // 驗證星賞扣除需求 (不需要任何星賞則設為0)
        const cost = c.starCost || 0;
        const userStars = currentUserData.stars || 0;

        if(userStars < cost) {
          alert("兌換失敗：您的星賞數量不足");
          return;
        }

        // 驗證兌換上限次數次數 (如果有設置)
        if(c.maxRedeem) {
          const userRedeemedCount = (currentUserData.redeemedCoupons && currentUserData.redeemedCoupons[couponId]) || 0;
          if(userRedeemedCount >= c.maxRedeem) {
            alert(`兌換失敗：此禮品每位會員限定兌換 ${c.maxRedeem} 次，您已達上限`);
            return;
          }
        }

        // 開始扣星賞並記錄兌換數據
        const nextStarsBalance = userStars - cost;
        const currentRedeemedLog = (currentUserData.redeemedCoupons && currentUserData.redeemedCoupons[couponId]) || 0;

        const userUpdates = {};
        userUpdates[`users/${currentUserUid}/stars`] = nextStarsBalance;
        userUpdates[`users/${currentUserUid}/redeemedCoupons/${couponId}`] = currentRedeemedLog + 1;

        update(ref(db), userUpdates).then(() => {
          alert(`恭喜成功兌換：${c.title}`);
        });
      });
    };

  </script>
</body>
