<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Bakery | Customer Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sb-green-dark: #1e3932;
            --sb-green-light: #006241;
            --sb-accent-gold: #cba258;
            --sb-gray-bg: #f2f0eb;
            --sb-gray-card: #f9f9f9;
            --sb-text-black: #212529;
            --sb-text-muted: #6c757d;
            --sb-border: #dbd9d3;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Montserrat', 'Noto Serif TC', serif; 
            background-color: var(--sb-gray-bg); 
            color: var(--sb-text-black);
            letter-spacing: 0.5px;
        }
        
        /* 導覽列與右上角購物車 */
        nav {
            background-color: var(--sb-green-dark);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .brand-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .cart-trigger {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .cart-trigger:hover {
            background: #ffffff;
            color: var(--sb-green-dark);
        }
        
        /* 主要商品排列區 */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--sb-green-dark);
            margin-bottom: 25px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--sb-border);
            padding-bottom: 10px;
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .product-card {
            background: #ffffff;
            border: 1px solid var(--sb-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--sb-text-black);
            margin-bottom: 8px;
        }
        
        .product-price {
            font-size: 14px;
            color: var(--sb-text-muted);
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid transparent;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background-color: var(--sb-green-dark);
            color: #ffffff;
        }
        
        .btn-primary:hover {
            background-color: var(--sb-green-light);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--sb-text-black);
            border-color: var(--sb-text-black);
            width: 100%;
        }
        
        /* 客製化選單模態彈窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            background: #ffffff;
            padding: 40px;
            width: 90%;
            max-width: 460px;
            border-top: 4px solid var(--sb-green-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--sb-green-dark);
            margin-bottom: 20px;
        }
        
        .option-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .option-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--sb-text-black);
        }
        
        .selector-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .selector-item {
            flex: 1;
            text-align: center;
        }
        
        .selector-item input[type="radio"] {
            display: none;
        }
        
        .selector-item label {
            display: block;
            padding: 10px;
            border: 1px solid var(--sb-border);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .selector-item input[type="radio"]:checked + label {
            background-color: var(--sb-green-dark);
            color: #ffffff;
            border-color: var(--sb-green-dark);
        }
        
        .fixed-value {
            padding: 10px;
            background-color: var(--sb-gray-bg);
            border: 1px solid var(--sb-border);
            font-size: 13px;
            font-weight: 500;
            color: var(--sb-text-black);
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-logo">AROMA BAKERY</div>
        <button class="cart-trigger" onclick="toggleCartModal()">購物車明細</button>
    </nav>

    <div class="container">
        <div class="section-title">精選飲品類 / Drinks</div>
        <div class="product-grid" id="drinks-container"></div>

        <div class="section-title">精緻甜點類 / Desserts</div>
        <div class="product-grid" id="desserts-container"></div>
    </div>

    <div class="modal" id="customize-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-product-name">商品名稱</div>
            
            <div class="option-group">
                <span class="option-label">冰量配置</span>
                <div class="selector-wrapper">
                    <div class="selector-item">
                        <input type="radio" id="ice-normal" name="ice-option" value="正常冰" checked>
                        <label class="custom-radio-label" for="ice-normal">正常冰</label>
                    </div>
                    <div class="selector-item">
                        <input type="radio" id="ice-more" name="ice-option" value="多冰">
                        <label class="custom-radio-label" for="ice-more">多冰</label>
                    </div>
                    <div class="selector-item">
                        <input type="radio" id="ice-less" name="ice-option" value="少冰">
                        <label class="custom-radio-label" for="ice-less">少冰</label>
                    </div>
                </div>
            </div>

            <div class="option-group">
                <span class="option-label">甜度配置</span>
                <div class="selector-wrapper">
                    <div class="selector-item">
                        <input type="radio" id="sugar-normal" name="sugar-option" value="正常甜" checked>
                        <label class="custom-radio-label" for="sugar-normal">正常甜</label>
                    </div>
                    <div class="selector-item">
                        <input type="radio" id="sugar-more" name="sugar-option" value="多甜">
                        <label class="custom-radio-label" for="sugar-more">多甜</label>
                    </div>
                    <div class="selector-item">
                        <input type="radio" id="sugar-less" name="sugar-option" value="少甜">
                        <label class="custom-radio-label" for="sugar-less">少甜</label>
                    </div>
                </div>
            </div>

            <div class="option-group">
                <span class="option-label">容量規格</span>
                <div class="fixed-value">500ml</div>
            </div>

            <div class="option-group">
                <span class="option-label">溫度規格</span>
                <div class="fixed-value">僅提供冷飲</div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="submitOrder()">確認下單</button>
                <button class="btn btn-secondary" style="flex: 1;" onclick="closeCustomizeModal()">取消</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let selectedProduct = null;

        // 監聽商品資料庫
        onValue(ref(database, 'products'), (snapshot) => {
            const products = snapshot.val() || {};
            renderCatalog(products);
        });

        function renderCatalog(products) {
            const drinksContainer = document.getElementById('drinks-container');
            const dessertsContainer = document.getElementById('desserts-container');
            drinksContainer.innerHTML = '';
            dessertsContainer.innerHTML = '';

            for (let id in products) {
                const p = products[id];
                const cardHtml = `
                    <div class="product-card">
                        <div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">HKD ${p.price}</div>
                        </div>
                        <button class="btn btn-primary" onclick="openPurchase('${id}', '${p.name}', '${p.category}', ${p.price})">加入購物車</button>
                    </div>
                `;

                if (p.category === '飲品') {
                    drinksContainer.insertAdjacentHTML('beforeend', cardHtml);
                } else {
                    dessertsContainer.insertAdjacentHTML('beforeend', cardHtml);
                }
            }
        }

        window.openPurchase = function(id, name, category, price) {
            selectedProduct = { id, name, category, price };
            if (category === '飲品') {
                document.getElementById('modal-product-name').innerText = name;
                document.getElementById('customize-modal').classList.add('active');
            } else {
                // 甜點不需客製化冰量，直接送出訂單
                executeDirectOrder(selectedProduct);
            }
        };

        window.closeCustomizeModal = function() {
            document.getElementById('customize-modal').classList.remove('active');
            selectedProduct = null;
        };

        window.submitOrder = function() {
            if (!selectedProduct) return;

            const selectedIce = document.querySelector('input[name="ice-option"]:checked').value;
            const selectedSugar = document.querySelector('input[name="sugar-option"]:checked').value;
            
            const orderId = 'ORD_' + Date.now();
            const orderData = {
                orderId: orderId,
                productName: selectedProduct.name,
                price: selectedProduct.price,
                category: selectedProduct.category,
                ice: selectedIce,
                sugar: selectedSugar,
                size: "500ml",
                temperature: "冷",
                timestamp: Date.now()
            };

            set(ref(database, 'orders/' + orderId), orderData)
                .then(() => {
                    alert('系統通知：訂單已成功送出。');
                    closeCustomizeModal();
                })
                .catch(err => alert('發送失敗: ' + err.message));
        };

        function executeDirectOrder(product) {
            const orderId = 'ORD_' + Date.now();
            const orderData = {
                orderId: orderId,
                productName: product.name,
                price: product.price,
                category: product.category,
                ice: "無",
                sugar: "無",
                size: "標準",
                temperature: "常溫",
                timestamp: Date.now()
            };

            set(ref(database, 'orders/' + orderId), orderData)
                .then(() => {
                    alert('系統通知：商品已成功送出訂單。');
                })
                .catch(err => alert('發送失敗: ' + err.message));
        }

        window.toggleCartModal = function() {
            alert('系統通知：已成功進入購物車模組。');
        };
    </script>
</body>
</html>
