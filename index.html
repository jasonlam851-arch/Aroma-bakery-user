<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 顧客登入與註冊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e3932;
            --secondary-color: #d4e9e2;
            --accent-color: #cba258;
            --text-color: #212529;
            --bg-overlay: rgba(30, 57, 50, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', 'Noto Serif TC', serif;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1544787219-7f47ccb76574?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .brand-header { text-align: center; margin-bottom: 30px; }
        .brand-logo { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; color: var(--primary-color); letter-spacing: 2px; text-transform: uppercase; }
        .brand-subtitle { font-size: 12px; color: var(--accent-color); letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; }

        .form-toggle { display: flex; justify-content: center; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; }
        .toggle-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; color: #6c757d; font-weight: 600; position: relative; transition: color 0.3s; }
        .toggle-btn.active { color: var(--primary-color); }
        .toggle-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background-color: var(--primary-color); }

        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }

        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--primary-color); letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #cccccc; border-radius: 6px; font-size: 14px; background-color: #fbfbfb; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--primary-color); background-color: #ffffff; box-shadow: 0 0 0 3px rgba(30, 57, 50, 0.1); }

        .phone-input-container { display: flex; }
        .phone-prefix { background: #e9ecef; border: 1px solid #cccccc; border-right: none; padding: 12px; font-size: 14px; border-radius: 6px 0 0 6px; color: #495057; font-weight: 600; }
        .phone-input-container input { border-radius: 0 6px 6px 0; }

        .btn-submit { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; letter-spacing: 1px; }
        .btn-submit:hover { background-color: #132521; }
        .input-hint { font-size: 11px; color: #6c757d; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-header">
            <div class="brand-logo">Aroma_bakery</div>
            <div class="brand-subtitle">Coffee & Premium Snacks</div>
        </div>

        <div class="form-toggle">
            <button class="toggle-btn active" onclick="switchForm('login')">會員登入</button>
            <button class="toggle-btn" onclick="switchForm('register')">註冊新帳戶</button>
        </div>

        <form id="login-form" onsubmit="handleCustomerLogin(event)">
            <div class="form-group">
                <label for="login-phone">電話號碼</label>
                <div class="phone-input-container">
                    <span class="phone-prefix">+852</span>
                    <input type="tel" id="login-phone" required placeholder="請輸入流動電話號碼" pattern="[0-9]{8}">
                </div>
            </div>
            <div class="form-group">
                <label for="login-password">密碼</label>
                <input type="password" id="login-password" required placeholder="請輸入密碼">
            </div>
            <button type="submit" class="btn-submit">登入</button>
        </form>

        <form id="register-form" class="hidden" onsubmit="handleCustomerRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label for="reg-last-name">中文姓氏</label>
                    <input type="text" id="reg-last-name" required placeholder="例：陳">
                </div>
                <div class="form-group">
                    <label for="reg-first-name">名字</label>
                    <input type="text" id="reg-first-name" required placeholder="例：大文">
                </div>
            </div>

            <div class="form-group">
                <label for="reg-phone">852 電話號碼</label>
                <div class="phone-input-container">
                    <span class="phone-prefix">+852</span>
                    <input type="tel" id="reg-phone" required placeholder="請輸入8位數字電話" pattern="[0-9]{8}">
                </div>
            </div>

            <div class="form-group">
                <label for="reg-birthday">出生月日</label>
                <input type="text" id="reg-birthday" required placeholder="MMDD (例：0529)" pattern="(0[1-9]|1[0-2])(0[1-9]|[12][0-9]|3[01])" maxlength="4">
            </div>

            <div class="form-group">
                <label for="reg-email">電子郵件 (選填)</label>
                <input type="email" id="reg-email" placeholder="example@domain.com">
            </div>

            <div class="form-group">
                <label for="reg-password">密碼</label>
                <input type="password" id="reg-password" required placeholder="請設定密碼" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{8,}$">
                <div class="input-hint">必須至少八位，且包含大寫字母、小寫字母及數字</div>
            </div>

            <div class="form-group">
                <label for="reg-referral">推薦號碼 (選填)</label>
                <input type="text" id="reg-referral" placeholder="請輸入推薦人號碼">
            </div>

            <button type="submit" class="btn-submit">確認註冊</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 登入邏輯
        window.handleCustomerLogin = function(event) {
            event.preventDefault();
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-password').value;
            const virtualEmail = `852${phone}@aroma.com`;

            signInWithEmailAndPassword(auth, virtualEmail, pass)
                .then((userCredential) => {
                    alert("登入成功，前往下單頁面");
                })
                .catch((error) => {
                    alert("登入失敗: 電話或密碼錯誤");
                });
        }

        // 註冊邏輯
        window.handleCustomerRegister = function(event) {
            event.preventDefault();
            const lastName = document.getElementById('reg-last-name').value;
            const firstName = document.getElementById('reg-first-name').value;
            const phone = document.getElementById('reg-phone').value;
            const birthday = document.getElementById('reg-birthday').value;
            const email = document.getElementById('reg-email').value || "未填寫";
            const pass = document.getElementById('reg-password').value;
            const referral = document.getElementById('reg-referral').value || "無";

            const virtualEmail = `852${phone}@aroma.com`;

            createUserWithEmailAndPassword(auth, virtualEmail, pass)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    // 將自訂使用者資料寫入 Realtime Database
                    set(ref(database, 'users/' + uid), {
                        lastName: lastName,
                        firstName: firstName,
                        phone: "852" + phone,
                        birthday: birthday,
                        email: email,
                        referral: referral,
                        role: "customer"
                    }).then(() => {
                        alert("註冊成功！已自動登入。");
                        location.reload();
                    });
                })
                .catch((error) => {
                    if(error.code === "auth/email-already-in-use") {
                        alert("該電話號碼已被註冊。");
                    } else {
                        alert("註冊失敗: " + error.message);
                    }
                });
        }
    </script>

    <script>
        function switchForm(formType) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const buttons = document.querySelectorAll('.toggle-btn');
            if (formType === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
            }
        }
    </script>
</body>
</html>
