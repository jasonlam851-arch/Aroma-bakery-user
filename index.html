<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aroma_bakery | 管理中央主控台</title>
  <style>
    :root {
      --sb-green-dark: #1e3932; --sb-green-light: #006241; --sb-accent-gold: #cba258;
      --sb-gray-bg: #f2f0eb; --sb-gray-card: #ffffff; --sb-border: #dbd9d3;
      --sb-text-black: #212529; --sb-text-muted: #6c757d; --sb-danger: #b02a37; --sb-warning: #ffc107;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: var(--sb-gray-bg); color: var(--sb-text-black); min-height: 100vh; letter-spacing: 0.5px; }
    
    #admin-auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(30,57,50,0.85), rgba(30,57,50,0.85)), url('https://images.unsplash.com/photo-1544787219-7f47ccb76574?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; background-size: cover; z-index: 1000; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
    .admin-container { background: #ffffff; padding: 45px; width: 90%; max-width: 440px; box-shadow: 0 20px 45px rgba(0,0,0,0.3); border-top: 5px solid var(--sb-accent-gold); }
    .admin-title-main { font-size: 22px; font-weight: 700; color: var(--sb-green-dark); text-align: center; margin-bottom: 5px; }
    .admin-subtitle-main { font-size: 11px; color: var(--sb-accent-gold); text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--sb-green-dark); }
    input, select, textarea { width: 100%; padding: 13px 16px; border: 1px solid var(--sb-border); font-size: 14px; background-color: #ffffff; }
    .btn { padding: 10px 20px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .btn-primary { background-color: var(--sb-green-dark); color: white; }
    .btn-warning { background-color: var(--sb-warning); color: #000; }
    .btn-danger { background-color: var(--sb-danger); color: white; }
    .btn-block { width: 100%; margin-top: 15px; padding: 14px; }
    
    #admin-system { display: none; }
    nav { background-color: var(--sb-green-dark); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; }
    .menu-toggle { font-size: 14px; font-weight: 600; cursor: pointer; color: var(--sb-accent-gold); border: 1px solid var(--sb-accent-gold); padding: 6px 15px; }
    .btn-nav-logout { background: transparent; border: 1px solid white; color: white; padding: 6px 15px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: var(--sb-green-dark); padding-top: 10px; transition: 0.3s; z-index: 200; }
    .sidebar.active { left: 0; }
    .sidebar-header { display: flex; justify-content: flex-end; padding: 20px; }
    .close-btn { font-size: 20px; color: white; cursor: pointer; }
    .sidebar-menu { list-style: none; padding: 30px; }
    .sidebar-menu li { padding: 18px 15px; color: #ffffff; font-size: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-menu li:hover { color: var(--sb-accent-gold); }
    
    .admin-main-view { padding: 40px 20px; max-width: 1200px; margin: 0 auto; display: grid; gap: 35px; }
    .admin-page { display: none; }
    .admin-page.active { display: block; }
    .panel { background: #ffffff; padding: 35px; border: 1px solid var(--sb-border); margin-bottom: 30px; }
    .panel-title { font-size: 18px; font-weight: 700; color: var(--sb-green-dark); margin-bottom: 25px; border-left: 4px solid var(--sb-accent-gold); padding-left: 12px; }
    
    .data-list { list-style: none; max-height: 550px; overflow-y: auto; border: 1px solid var(--sb-border); padding: 0; }
    .data-item { border-bottom: 1px solid var(--sb-border); padding: 20px; font-size: 14px; }
    .data-row-main { display: flex; justify-content: space-between; align-items: center; }
    .data-info-text { font-weight: 500; }
    .data-sub-text { color: var(--sb-text-muted); margin-left: 12px; font-size: 12px; }
    .data-actions { display: flex; gap: 10px; }
    
    .edit-zone { display: none; background: #fdfdfc; border: 1px dashed var(--sb-accent-gold); padding: 25px; margin-top: 20px; }
    .edit-zone.active { display: block; }
    .edit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div id="admin-auth-overlay">
    <div class="admin-container">
      <div class="admin-title-main">AROMA BAKERY</div><div class="admin-subtitle-main">CENTRAL MANAGEMENT SYSTEM</div>
      <form id="admin-login-form">
        <div class="form-group"><label>管理員帳號</label><input type="text" id="admin-username" required></div>
        <div class="form-group"><label>密碼</label><input type="password" id="admin-password" required></div>
        <button type="submit" class="btn btn-primary btn-block">登入主控台</button>
      </form>
    </div>
  </div>

  <div id="admin-system">
    <nav>
      <div class="menu-toggle" onclick="toggleSidebar()">選單</div>
      <div style="font-weight:700; letter-spacing:2px;">AROMA BAKERY CMS</div>
      <button class="btn-nav-logout" onclick="handleAdminLogout()">登出</button>
    </nav>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="close-btn" onclick="toggleSidebar()">×</div></div>
      <ul class="sidebar-menu">
        <li onclick="switchAdminPage('page-products')">商品架設與維護</li>
        <li onclick="switchAdminPage('page-members')">全系統會員檔案庫</li>
      </ul>
    </div>

    <div class="admin-main-view">
      <div id="page-products" class="admin-page active">
        <div class="panel">
          <div class="panel-title">建立新商品</div>
          <form id="product-form">
            <div class="form-group"><label>商品名稱</label><input type="text" id="p-name" required></div>
            <div class="form-group"><label>定價 (HKD)</label><input type="number" id="p-price" required></div>
            <div class="form-group"><label>分類</label>
              <select id="p-category"><option value="飲品">飲品</option><option value="甜點">甜點</option></select>
            </div>
            
            <div class="form-group">
              <label>前台客製化規格選項配置（僅對飲品生效）</label>
              <div style="display: flex; gap: 20px; padding: 5px 0;">
                <label style="display: inline-flex; align-items: center;"><input type="checkbox" id="p-has-ice" checked style="width: auto; margin-right: 5px;"> 啟用冰量調節</label>
                <label style="display: inline-flex; align-items: center;"><input type="checkbox" id="p-has-sugar" checked style="width: auto; margin-right: 5px;"> 啟用甜度調節</label>
              </div>
            </div>

            <div class="form-group"><label>圖片 URL</label><input type="url" id="p-photo"></div>
            <div class="form-group"><label>詳細描述</label><textarea id="p-detail" rows="3"></textarea></div>
            <button type="submit" class="btn btn-primary btn-block">發布上架</button>
          </form>
        </div>

        <div class="panel">
          <div class="panel-title">商品維護庫</div>
          <ul class="data-list" id="admin-products-list"></ul>
        </div>
      </div>

      <div id="page-members" class="admin-page">
        <div class="panel">
          <div class="panel-title">會員檢索庫</div>
          <ul class="data-list" id="admin-members-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
      authDomain: "aroma-bakery-492fa.firebaseapp.com",
      databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
      projectId: "aroma-bakery-492fa",
      storageBucket: "aroma-bakery-492fa.firebasestorage.app",
      messagingSenderId: "1060567946315",
      appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce",
      measurementId: "G-D2C1M4SBPC"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
      if(user && user.email === 'admin01@aroma.com') {
        document.getElementById('admin-auth-overlay').style.display = 'none';
        document.getElementById('admin-system').style.display = 'block';
        loadProductsAdmin(); loadMembersAdmin();
      } else {
        document.getElementById('admin-system').style.display = 'none';
        document.getElementById('admin-auth-overlay').style.display = 'flex';
      }
    });

    document.getElementById('admin-login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('admin-username').value;
      if(user !== 'admin01@aroma.com') return alert('非管理帳號！');
      signInWithEmailAndPassword(auth, user, document.getElementById('admin-password').value).catch(() => alert('密碼錯誤。'));
    });

    window.handleAdminLogout = function() { if(confirm("確定登出後台？")) signOut(auth); };

    // 商品發布 
    document.getElementById('product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = 'PROD_' + Date.now();
      const name = document.getElementById('p-name').value;
      const price = parseInt(document.getElementById('p-price').value);
      const category = document.getElementById('p-category').value;
      const hasIce = document.getElementById('p-has-ice').checked;
      const hasSugar = document.getElementById('p-has-sugar').checked;

      set(ref(database, 'products/' + id), {
        name, price, category, photoUrl: document.getElementById('p-photo').value, detail: document.getElementById('p-detail').value, hasIce, hasSugar
      }).then(() => { alert('發布成功！'); document.getElementById('product-form').reset(); });
    });

    // 修正：將 loadProductsAdmin 內動態 HTML 呼叫的函式掛載到 window 全域物件
    function loadProductsAdmin() {
      onValue(ref(database, 'products'), (snapshot) => {
        const list = document.getElementById('admin-products-list');
        list.innerHTML = '';
        const data = snapshot.val() || {};
        for(let id in data) {
          const p = data[id];
          const iceChk = p.hasIce !== false ? 'checked' : '';
          const sugarChk = p.hasSugar !== false ? 'checked' : '';
          list.insertAdjacentHTML('beforeend', `
            <li class="data-item">
              <div class="data-row-main">
                <div class="data-info-text">[${p.category}] ${p.name} <span class="data-sub-text">HKD ${p.price}</span></div>
                <div class="data-actions">
                  <button class="btn btn-warning" onclick="document.getElementById('edit-${id}').classList.toggle('active')">修改</button>
                  <button class="btn btn-danger" onclick="deleteProduct('${id}')">下架</button>
                </div>
              </div>
              <div class="edit-zone" id="edit-${id}">
                <div class="edit-grid">
                  <div><label>名稱</label><input type="text" id="e-name-${id}" value="${p.name}"></div>
                  <div><label>價格</label><input type="number" id="e-price-${id}" value="${p.price}"></div>
                  <div><label>選項</label><label><input type="checkbox" id="e-ice-${id}" ${iceChk}> 冰量</label> <label><input type="checkbox" id="e-sugar-${id}" ${sugarChk}> 甜度</label></div>
                </div>
                <button class="btn btn-primary" onclick="saveUpdate('${id}')">儲存變更</button>
              </div>
            </li>`);
        }
      });
    }

    // 修正：明確掛載到 window，確保行內屬性 onclick="saveUpdate(...)" 可成功觸壞
    window.saveUpdate = function(id) {
      update(ref(database, 'products/' + id), {
        name: document.getElementById(`e-name-${id}`).value, 
        price: parseInt(document.getElementById(`e-price-${id}`).value),
        hasIce: document.getElementById(`e-ice-${id}`).checked, 
        hasSugar: document.getElementById(`e-sugar-${id}`).checked
      }).then(() => alert('更新成功！'));
    };

    // 修正：明確掛載到 window，確保 onclick="deleteProduct(...)" 可運作
    window.deleteProduct = function(id) { if(confirm("確定下架？")) remove(ref(database, 'products/' + id)); };

    function loadMembersAdmin() {
      onValue(ref(database, 'users'), (snapshot) => {
        const container = document.getElementById('admin-members-list');
        container.innerHTML = '';
        const members = snapshot.val() || {};
        for(let uid in members) {
          const m = members[uid];
          container.insertAdjacentHTML('beforeend', `<li class="data-item"><div class="data-info-text">${m.lastName||''}${m.firstName||'未填名'} <span class="data-sub-text">電話: ${m.phone||'無'} | 電郵: ${m.email||'無'}</span></div></li>`);
        }
      });
    }
  </script>

  <script>
    // 側邊欄與頁面切換控制（保持在全域作用域）
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function switchAdminPage(pageId) { document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active')); document.getElementById(pageId).classList.add('active'); document.getElementById('sidebar').classList.remove('active'); }
  </script>
</body>
</html>
