<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Bakery - 顧客線上點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 min-h-screen font-sans">

    <nav class="bg-amber-700 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">🍞 Aroma Bakery</h1>
            <span class="text-sm bg-amber-800 px-3 py-1 rounded-full">美味烘焙 ‧ 即刻預訂</span>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <h2 class="text-xl font-bold text-amber-900 mb-4 flex items-center">今日現烤麵包</h2>
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500">美味麵包出爐中，請稍候...</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-amber-100 h-fit sticky top-20">
            <h2 class="text-xl font-bold text-amber-900 mb-4 pb-2 border-b">🛒 您的購物車</h2>
            
            <div id="cart-items" class="space-y-3 max-h-60 overflow-y-auto mb-4">
                <p class="text-gray-400 text-center py-4">購物車還是空的，快去挑選麵包吧！</p>
            </div>

            <div class="flex justify-between items-center font-bold text-lg text-amber-950 mb-6">
                <span>總計金額：</span>
                <span>$ <span id="cart-total">0</span></span>
            </div>

            <form id="order-form" class="space-y-3">
                <h3 class="font-semibold text-gray-700 border-t pt-3">📋 取貨資訊</h3>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">姓名</label>
                    <input type="text" id="cust-name" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">電話</label>
                    <input type="tel" id="cust-phone" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">預計取貨時間</label>
                    <input type="time" id="cust-time" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>
                <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200 mt-4">
                    確認送出訂單
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let productsData = {}; 
        let cart = {};

        // 1. 即時監聽 Firestore 商品資料
        onSnapshot(collection(db, "products"), (snapshot) => {
            const productList = document.getElementById("product-list");
            productList.innerHTML = "";
            productsData = {};

            if(snapshot.empty) {
                productList.innerHTML = `<p class="text-gray-500 col-span-2">目前沒有上架中的麵包。</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const p = doc.data();
                const id = doc.id;
                productsData[id] = { id, ...p };

                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-amber-100 flex gap-4 items-center";
                card.innerHTML = `
                    <img src="${p.image || 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=150'}" class="w-20 h-20 object-cover rounded-lg bg-gray-100">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800 text-lg">${p.name}</h3>
                        <p class="text-amber-700 font-semibold">$ ${p.price}</p>
                        <p class="text-xs text-gray-400">當日剩餘庫存: ${p.stock || 0}</p>
                    </div>
                    <button onclick="addToCart('${id}')" class="bg-amber-100 hover:bg-amber-600 hover:text-white text-amber-800 font-bold py-1 px-3 rounded-lg transition duration-200 text-sm">
                        + 加購物車
                    </button>
                `;
                productList.appendChild(card);
            });
        });

        // 2. 購物車邏輯 (掛載到 window 讓 HTML 監聽按鈕能觸發)
        window.addToCart = (id) => {
            const product = productsData[id];
            if (!product || product.stock <= 0) {
                alert("該商品已售完或不存在！");
                return;
            }
            if (cart[id]) {
                if (cart[id].qty >= product.stock) {
                    alert("抱歉，已達今日現貨庫存上限！");
                    return;
                }
                cart[id].qty++;
            } else {
                cart[id] = { name: product.name, price: product.price, qty: 1 };
            }
            renderCart();
        };

        window.updateQty = (id, amount) => {
            if (!cart[id]) return;
            cart[id].qty += amount;
            if (cart[id].qty <= 0) delete cart[id];
            renderCart();
        };

        function renderCart() {
            const container = document.getElementById("cart-items");
            const totalSpan = document.getElementById("cart-total");
            container.innerHTML = "";
            let total = 0;

            const keys = Object.keys(cart);
            if (keys.length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-4">購物車還是空的，快去挑選麵包吧！</p>`;
                totalSpan.innerText = "0";
                return;
            }

            keys.forEach(id => {
                const item = cart[id];
                total += item.price * item.qty;
                const div = document.createElement("div");
                div.className = "flex justify-between items-center text-sm border-b pb-2";
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="font-medium text-gray-800">${item.name}</div>
                        <div class="text-xs text-gray-400">$${item.price} x ${item.qty}</div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="updateQty('${id}', -1)" class="px-2 py-0.5 bg-gray-200 rounded text-xs font-bold">-</button>
                        <span class="w-6 text-center font-semibold">${item.qty}</span>
                        <button onclick="updateQty('${id}', 1)" class="px-2 py-0.5 bg-gray-200 rounded text-xs font-bold">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
            totalSpan.innerText = total;
        }

        // 3. 送出訂單至 Firebase
        document.getElementById("order-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (Object.keys(cart).length === 0) {
                alert("購物車內沒有商品！");
                return;
            }

            const orderData = {
                customerName: document.getElementById("cust-name").value,
                customerPhone: document.getElementById("cust-phone").value,
                pickupTime: document.getElementById("cust-time").value,
                items: Object.values(cart),
                totalPrice: Number(document.getElementById("cart-total").innerText),
                status: "待接單", // 初始狀態
                createdAt: Timestamp.now()
            };

            try {
                await addDoc(collection(db, "orders"), orderData);
                alert("🎉 訂單送出成功！請準時前往現場取貨。");
                cart = {};
                renderCart();
                document.getElementById("order-form").reset();
            } catch (error) {
                console.error("Error added document: ", error);
                alert("訂單送出失敗，請稍後再試。");
            }
        });
    </script>
</body>
</html>
