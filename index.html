<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma_bakery | 會員中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #1e3932;
            --accent-color: #cba258;
            --text-color: #212529;
            --bg-cream: #f4f2ed;
            --dark-overlay: rgba(15, 23, 20, 0.75);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', 'Noto Serif TC', serif; background-color: var(--bg-cream); color: var(--text-color); min-height: 100vh; }

        /* 會員登入封面 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                        url('https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover; z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px; border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 90%; max-width: 380px; border-top: 4px solid var(--accent-color);
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-title { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; color: var(--primary-color); }
        .login-subtitle { font-size: 11px; color: #6c757d; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: #495057; }
        input { width: 100%; padding: 12px; border: 1px solid #cccccc; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: var(--primary-color); }
        
        .btn-login { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px; }
        .error-message { color: #b02a37; font-size: 13px; text-align: center; margin-top: 15px; display: none; }

        /* 會員核心主面板 */
        #member-system { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        
        /* 專屬高質感會員卡片 */
        .member-card {
            background: linear-gradient(135deg, #11221e 0%, #1e3932 100%);
            color: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); margin-top: 20px;
            position: relative; overflow: hidden;
        }
        .card-brand { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--accent-color); margin-bottom: 20px; }
        .card-holder { margin-top: 15px; }
        .card-holder .label { font-size: 10px; text-transform: uppercase; color: #a3b8b0; letter-spacing: 1px; }
        .card-holder .name { font-size: 18px; font-weight: 600; margin-top: 2px; }
        .card-phone { font-size: 14px; color: #d4e9e2; margin-top: 5px; font-family: 'Montserrat', sans-serif; }

        /* 二維碼容器區塊 */
        .qrcode-zone { background: white; padding: 20px; border-radius: 8px; margin-top: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .qrcode-title { font-size: 13px; font-weight: 600; color: var(--primary-color); margin-bottom: 15px; letter-spacing: 1px; }
        #qrcode-container { display: flex; justify-content: center; align-items: center; margin: 0 auto; padding: 10px; }
        #qrcode-container img { display: block; } /* 修正部分手機渲染白邊問題 */

        .member-details { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #e1ded7; }
        .detail-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { color: #6c757d; font-weight: 600; }
        .detail-value { color: var(--primary-color); font-weight: 600; }

        .btn-logout { width: 100%; padding: 12px; background-color: #6c757d; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 25px; }

        /* 通用客製化自訂提示窗 (無網址預設提示，無表情包) */
        .custom-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .custom-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; padding: 25px; border-radius: 6px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .btn-modal-close { padding: 8px 24px; background-color: var(--primary-color); color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-box">
            <div class="login-header">
                <div class="login-title">Aroma_bakery</div>
                <div class="login-subtitle">Member System</div>
            </div>
            <form id="member-login-form" onsubmit="handleMemberLogin(event); return false;">
                <div class="form-group">
                    <label>登記電話號碼</label>
                    <input type="tel" id="login-phone" required placeholder="請輸入您的電話號碼">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="login-password" required placeholder="請輸入密碼">
                </div>
                <button type="submit" class="btn-login">登入會員中心</button>
                <div id="error-msg" class="error-message">電話號碼或密碼不正確，請重新輸入。</div>
            </form>
        </div>
    </div>

    <div id="member-system">
        <div class="member-card">
            <div class="card-brand">Aroma Bakery</div>
            <div class="card-holder">
                <div class="label">Membership Card</div>
                <div class="name" id="card-name-display">載入中...</div>
                <div class="card-phone" id="card-phone-display">--------</div>
            </div>
        </div>

        <div class="qrcode-zone">
            <div class="qrcode-title">店員核銷專用會員二維碼</div>
            <div id="qrcode-container"></div>
        </div>

        <div class="member-details">
            <div class="detail-item">
                <span class="detail-label">出生月份</span>
                <span class="detail-value" id="info-birthday">--</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">帳戶狀態</span>
                <span class="detail-value" style="color: #198754;">有效會員</span>
            </div>
        </div>

        <button class="btn-logout" onclick="handleLogout()">安全登出</button>
    </div>

    <div class="custom-modal" id="custom-alert-modal">
        <div class="modal-content">
            <p id="custom-alert-text" style="font-weight:600; color:#1e3932; line-height: 1.5; font-size: 14px;"></p>
            <button class="btn-modal-close" onclick="closeCustomAlert()">確定</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com",
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let currentQRCodeInstance = null;

        // 會員安全登入
        window.handleMemberLogin = function(e) {
            if(e && e.preventDefault) e.preventDefault();
            const phone = document.getElementById('login-phone').value.trim();
            const password = document.getElementById('login-password').value.trim();
            
            // 將電話號碼轉換為 Firebase Authentication 要求的格式
            const emailFormat = `m_${phone}@aroma.com`;

            signInWithEmailAndPassword(auth, emailFormat, password)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('member-system').style.display = 'block';
                    
                    // 執行即時會員資料連線
                    fetchMemberData(uid);
                })
                .catch((err) => {
                    console.error(err);
                    document.getElementById('error-msg').style.display = 'block';
                });
        };

        // 即時取得並渲染會員資料
        function fetchMemberData(uid) {
            onValue(ref(database, 'users/' + uid), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const fullName = `${data.lastName || ''}${data.firstName || ''}`;
                    const phoneNum = data.phone || '';
                    
                    // 渲染介面文字
                    document.getElementById('card-name-display').innerText = fullName;
                    document.getElementById('card-phone-display').innerText = phoneNum;
                    document.getElementById('info-birthday').innerText = data.birthday || '未填寫';
                    
                    // 核心修正：觸發手機端高相容性二維碼生成
                    generateMobileQRCode(phoneNum);
                }
            });
        }

        // 核心修正：專門對抗手機瀏覽器排他性的二維碼渲染函數
        function generateMobileQRCode(textData) {
            const container = document.getElementById('qrcode-container');
            if (!container || !textData) return;

            // 徹底清空容器內的所有舊節點，防止重複疊加
            container.innerHTML = '';

            try {
                // 初始化手機端高相容性的 QRCode 物件
                currentQRCodeInstance = new QRCode(container, {
                    text: textData,
                    width: 160,
                    height: 160,
                    colorDark: "#1e3932",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H // 高容錯率，防止手機螢幕亮度不足時掃描失敗
                });
            } catch (error) {
                console.error("手機端二維碼生成出錯：", error);
            }
        }

        // 安全登出邏輯
        window.handleLogout = function() {
            signOut(auth).then(() => {
                document.getElementById('member-login-form').reset();
                document.getElementById('error-msg').style.display = 'none';
                document.getElementById('member-system').style.display = 'none';
                document.getElementById('auth-overlay').style.display = 'flex';
                if(currentQRCodeInstance) currentQRCodeInstance.clear();
            }).catch((err) => {
                showCustomAlert('登出系統時發生未知錯誤。');
            });
        };
    </script>

    <script>
        // 純 UI 客製化彈窗驅動邏輯（100% 棄用原生 alert 與表情包）
        function showCustomAlert(msg) {
            document.getElementById('custom-alert-text').innerText = msg;
            document.getElementById('custom-alert-modal').classList.add('active');
        }
        function closeCustomAlert() {
            document.getElementById('custom-alert-modal').classList.remove('active');
        }
    </script>
</body>
</html>
