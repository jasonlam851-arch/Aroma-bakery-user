<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroma Bakery | Premium Artisanal Ordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;600&display=swap');
        .font-brand { font-family: 'Cinzel', 'Noto Serif TC', serif; }
    </style>
</head>
<body class="bg-[#FBF9F6] text-[#2C2623] font-brand min-h-screen antialiased">

    <nav class="bg-[#1A1512] text-[#E5D5C5] py-6 px-8 shadow-sm sticky top-0 z-50 tracking-widest border-b border-[#322A24]">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold tracking-[0.2em] uppercase">Aroma Bakery</h1>
                <p class="text-[10px] text-[#A89280] uppercase tracking-[0.3em] mt-1">Artisanal & Premium Boulangerie</p>
            </div>
            <span class="text-xs border border-[#A89280] px-4 py-1.5 rounded-full text-[#A89280]">TODAY's FRESH BAKED</span>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2">
            <h2 class="text-xl font-semibold tracking-wider text-[#1A1512] mb-8 pb-3 border-b border-[#E5D5C5]">今日限量出爐</h2>
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <p class="text-[#A89280] italic">Loading the aroma...</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-none shadow-sm border border-[#E5D5C5] h-fit sticky top-28">
            <h2 class="text-lg font-semibold tracking-widest text-[#1A1512] mb-6 pb-2 border-b border-[#2C2623]">YOUR SELECTION</h2>
            
            <div id="cart-items" class="space-y-4 max-h-60 overflow-y-auto mb-6">
                <p class="text-gray-400 text-center py-6 text-sm italic">購物車尚無選購上品</p>
            </div>

            <div class="flex justify-between items-center font-semibold text-md text-[#1A1512] mb-8 pt-4 border-t border-dashed border-[#E5D5C5]">
                <span class="tracking-widest">ESTIMATED TOTAL</span>
                <span class="text-xl">NT$ <span id="cart-total">0</span></span>
            </div>

            <form id="order-form" class="space-y-4 text-sm">
                <h3 class="font-semibold text-[#1A1512] tracking-wider uppercase text-xs mb-2">PICKUP DETAILS</h3>
                <div>
                    <input type="text" id="cust-name" placeholder="尊姓大名" required class="w-full p-3 bg-[#FBF9F6] border border-[#E5D5C5] rounded-none focus:outline-none focus:border-[#1A1512] transition">
                </div>
                <div>
                    <input type="tel" id="cust-phone" placeholder="聯絡電話" required class="w-full p-3 bg-[#FBF9F6] border border-[#E5D5C5] rounded-none focus:outline-none focus:border-[#1A1512] transition">
                </div>
                <div>
                    <label class="block text-xs text-[#A89280] mb-1 tracking-wider">預計取貨時間 TIME</label>
                    <input type="time" id="cust-time" required class="w-full p-3 bg-[#FBF9F6] border border-[#E5D5C5] rounded-none focus:outline-none focus:border-[#1A1512] transition">
                </div>
                <button type="submit" class="w-full bg-[#1A1512] hover:bg-[#322A24] text-[#E5D5C5] tracking-[0.2em] font-medium py-4 px-4 rounded-none transition duration-300 mt-6 uppercase text-xs">
                    送出預訂訂單
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbRM8chwqn-MbVxdraBZ4EGUFCF0jtfkE",
            authDomain: "aroma-bakery-492fa.firebaseapp.com",
            databaseURL: "https://aroma-bakery-492fa-default-rtdb.firebaseio.com", // 補上RTDB專用URL
            projectId: "aroma-bakery-492fa",
            storageBucket: "aroma-bakery-492fa.firebasestorage.app",
            messagingSenderId: "1060567946315",
            appId: "1:1060567946315:web:9693ac0e3486ab52c5e9ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let productsData = {}; 
        let cart = {};

        // 監聽 RTDB 商品
        onValue(ref(db, "products"), (snapshot) => {
            const productList = document.getElementById("product-list");
            productList.innerHTML = "";
            productsData = snapshot.val() || {};

            if(Object.keys(productsData).length === 0) {
                productList.innerHTML = `<p class="text-gray-400 italic">今日限定烘焙準備中...</p>`;
                return;
            }

            for (let id in productsData) {
                const p = productsData[id];
                const card = document.createElement("div");
                card.className = "bg-white rounded-none border border-[#E5D5C5] overflow-hidden group hover:shadow-md transition duration-300 flex flex-col justify-between";
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-[4/3]">
                        <img src="${p.image || 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=500'}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        ${p.stock <= 0 ? '<div class="absolute inset-0 bg-black/40 backdrop-blur-[1px] flex items-center justify-center text-[#E5D5C5] tracking-widest text-xs">SOLD OUT</div>' : ''}
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between gap-4">
                        <div>
                            <h3 class="font-semibold text-base text-[#1A1512] tracking-wide mb-1">${p.name}</h3>
                            <p class="text-xs text-[#A89280] tracking-wider">每日限量現貨 / 剩餘 ${p.stock || 0} 個</p>
                        </div>
                        <div class="flex justify-between items-center pt-2 border-t border-[#FBF9F6]">
                            <span class="text-sm font-medium text-[#2C2623]">NT$ ${p.price}</span>
                            <button onclick="addToCart('${id}')" ${p.stock <= 0 ? 'disabled' : ''} class="border border-[#1A1512] hover:bg-[#1A1512] hover:text-[#E5D5C5] text-[#1A1512] text-xs px-3 py-1.5 transition duration-300 tracking-widest uppercase disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:text-[#1A1512]">
                                + ADD
                            </button>
                        </div>
                    </div>
                `;
                productList.appendChild(card);
            }
        });

        window.addToCart = (id) => {
            const product = productsData[id];
            if (!product || product.stock <= 0) return;
            if (cart[id]) {
                if (cart[id].qty >= product.stock) { alert("已達今日現貨供應上限"); return; }
                cart[id].qty++;
            } else {
                cart[id] = { name: product.name, price: product.price, qty: 1 };
            }
            renderCart();
        };

        window.updateQty = (id, amount) => {
            if (!cart[id]) return;
            cart[id].qty += amount;
            if (cart[id].qty <= 0) delete cart[id];
            renderCart();
        };

        function renderCart() {
            const container = document.getElementById("cart-items");
            const totalSpan = document.getElementById("cart-total");
            container.innerHTML = "";
            let total = 0;

            if (Object.keys(cart).length === 0) {
                container.innerHTML = `<p class="text-gray-400 text-center py-6 text-sm italic">購物車尚無選購上品</p>`;
                totalSpan.innerText = "0";
                return;
            }

            for (let id in cart) {
                const item = cart[id];
                total += item.price * item.qty;
                const div = document.createElement("div");
                div.className = "flex justify-between items-center text-xs pb-3 border-b border-[#FBF9F6]";
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="font-medium text-[#1A1512] tracking-wide">${item.name}</div>
                        <div class="text-[#A89280] mt-0.5">NT$ ${item.price}</div>
                    </div>
                    <div class="flex items-center gap-3 border border-[#E5D5C5] px-2 py-1">
                        <button onclick="updateQty('${id}', -1)" class="text-gray-500 hover:text-black font-bold">-</button>
                        <span class="w-4 text-center font-semibold">${item.qty}</span>
                        <button onclick="updateQty('${id}', 1)" class="text-gray-500 hover:text-black font-bold">+</button>
                    </div>
                `;
                container.appendChild(div);
            }
            totalSpan.innerText = total;
        }

        document.getElementById("order-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (Object.keys(cart).length === 0) { alert("購物車內無商品"); return; }

            const orderData = {
                customerName: document.getElementById("cust-name").value,
                customerPhone: document.getElementById("cust-phone").value,
                pickupTime: document.getElementById("cust-time").value,
                items: Object.values(cart),
                totalPrice: Number(document.getElementById("cart-total").innerText),
                status: "待接單",
                createdAt: Date.now()
            };

            const ordersRef = ref(db, "orders");
            const newOrderRef = push(ordersRef);
            await set(newOrderRef, orderData);
            alert("✨ 貴賓您好，Aroma Bakery 已收到您的精緻預訂訂單。");
            cart = {};
            renderCart();
            document.getElementById("order-form").reset();
        });
    </script>
</body>
</html>
